<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta tu Examen de RX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 16px; }
    .ver-btn { white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container mt-4" style="max-width:660px;">
    <h2 class="text-center mb-4">Consulta tus Lecturas de RX</h2>

    <div id="login">
      <div class="mb-3">
        <label class="form-label">Tipo de Documento*</label>
        <select class="form-select" id="tipoDocumento">
          <option value="CC">CC</option>
          <option value="TI">TI</option>
          <option value="PE">PE</option>
          <option value="RC">RC</option>
          <option value="CE">CE</option>
          <option value="PA">PA</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Documento del Paciente*</label>
        <input type="text" id="numeroIdentificacion" class="form-control" placeholder="Sin puntos ni comas">
      </div>
      <div class="mb-3">
        <input type="checkbox" id="acuerdoPrivacidad">
        <label for="acuerdoPrivacidad"> Acepto la
          <a href="https://www.especialistasdeleje.com/politica-de-tratamiento-de-datos" target="_blank">política de tratamiento de datos</a>
        </label>
      </div>
      <div class="text-center">
        <button class="btn btn-primary" id="btnEnviar" onclick="enviar()">Mostrar Examen</button>
      </div>
      <div class="text-center mt-3" id="loading" style="display:none;">
        <div class="spinner-border text-primary"></div>
      </div>
      <div class="text-center mt-3">
        <a href="https://forms.gle/kcL9nVWJXNBvhKCx6" target="_blank">¿Tienes problema con la entrega de tu examen?</a>
      </div>
    </div>

    <div id="onError" class="mt-3"></div>
    <div id="pagina2" class="mt-3"></div>
  </div>

  <script>
    // ⚠️ Reemplaza esta URL solo si vuelves a desplegar la web app (Implementar → nueva implementación)
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzrCwaVBQXgBlkvYByMYyLYOMJb24rmWpiDVOmGPGB2pIp5HJzEedANr9vWrryiQrc2mA/exec";

    // Llama a la web app por JSONP (sin pestaña nueva, sin datos en la barra de direcciones)
    function jsonp(params) {
      return new Promise(function (resolve, reject) {
        var cb = "cb_" + Math.random().toString(36).slice(2);
        var s = document.createElement("script");
        var timer = setTimeout(function () { cleanup(); reject("Tiempo de espera agotado. Intente de nuevo."); }, 30000);
        function cleanup() { try { delete window[cb]; } catch (e) { window[cb] = undefined; } if (s.parentNode) s.parentNode.removeChild(s); clearTimeout(timer); }
        window[cb] = function (data) { cleanup(); resolve(data); };
        var qs = Object.keys(params).map(function (k) { return k + "=" + encodeURIComponent(params[k]); }).join("&");
        s.src = WEBAPP_URL + "?callback=" + cb + "&" + qs;
        s.onerror = function () { cleanup(); reject("No se pudo conectar con el servidor."); };
        document.body.appendChild(s);
      });
    }

    function enviar() {
      if (!document.getElementById('acuerdoPrivacidad').checked) {
        alert('Debe aceptar la política de tratamiento de datos para continuar.');
        return;
      }
      var datos = {
        tipoDocumento: document.getElementById('tipoDocumento').value,
        numeroIdentificacion: document.getElementById('numeroIdentificacion').value.trim()
      };
      if (!datos.numeroIdentificacion) {
        alert('Complete el documento.');
        return;
      }
      mostrar('loading', true);
      error('');
      var btn = document.getElementById('btnEnviar'); btn.disabled = true;

      jsonp(datos).then(function (r) {
        if (r && r.error) { error(r.error); }
        else { render(r); }
      }).catch(function (e) {
        error(e.toString());
      }).then(function () {
        mostrar('loading', false);
        btn.disabled = false;
      });
    }

    function render(u) {
      var h = '<div class="card">';
      h += '<div class="card-header bg-primary text-white">Documento: ' + u.id + '</div>';
      h += '<div class="card-body p-0"><table class="table table-hover mb-0"><thead><tr>';
      h += '<th>Paciente</th><th>Fecha de toma</th><th>Examen</th></tr></thead><tbody>';
      for (var i = 0; i < u.examenes.length; i++) {
        var ex = u.examenes[i];
        // ✅ AHORA u.tokens[i] es un ARREGLO: puede haber varios exámenes
        //    del mismo paciente el mismo día.
        var tokensFila = (u.tokens && u.tokens[i]) ? u.tokens[i] : [];
        h += '<tr><td>' + (ex[0] || '') + '</td><td>' + (ex[3] || '') + '</td><td>';
        if (tokensFila.length === 0) {
          h += '<span class="badge bg-warning text-dark">Aún no disponible</span>';
        } else if (tokensFila.length === 1) {
          h += '<button class="btn btn-sm btn-primary ver-btn" onclick="verPdf(\'' + tokensFila[0] + '\', this)">📄 Ver examen</button>';
        } else {
          for (var t = 0; t < tokensFila.length; t++) {
            h += '<button class="btn btn-sm btn-primary ver-btn mb-1" onclick="verPdf(\'' + tokensFila[t] + '\', this)">📄 Ver examen ' + (t + 1) + '</button> ';
          }
        }
        h += '</td></tr>';
      }
      h += '</tbody></table></div></div>';
      h += '<div class="text-center mt-3"><button class="btn btn-secondary" onclick="nueva()">🔍 Nueva consulta</button></div>';
      document.getElementById('pagina2').innerHTML = h;
      document.getElementById('login').style.display = 'none';
    }

    // Pide el PDF por token, lo reconstruye en el navegador y lo abre (archivo privado)
    function verPdf(token, btn) {
      var original = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '⏳ Cargando...';
      jsonp({ action: 'verPdf', token: token }).then(function (r) {
        if (r && r.error) { alert(r.error); return; }
        var bytes = atob(r.base64);
        var arr = new Uint8Array(bytes.length);
        for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
        var blob = new Blob([arr], { type: r.mime || 'application/pdf' });
        window.open(URL.createObjectURL(blob), '_blank');
      }).catch(function (e) {
        alert(e.toString());
      }).then(function () {
        btn.disabled = false;
        btn.innerHTML = original;
      });
    }

    function nueva() {
      document.getElementById('pagina2').innerHTML = '';
      document.getElementById('onError').innerHTML = '';
      document.getElementById('login').style.display = 'block';
      document.getElementById('numeroIdentificacion').value = '';
      document.getElementById('acuerdoPrivacidad').checked = false;
    }

    function mostrar(id, on) { document.getElementById(id).style.display = on ? 'block' : 'none'; }
    function error(msg) { document.getElementById('onError').innerHTML = msg ? '<div class="alert alert-danger">' + msg + '</div>' : ''; }
  </script>
</body>
</html>
