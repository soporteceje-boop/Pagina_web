<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta tu Examen de RX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5" style="max-width:600px;">
    <h2 class="text-center mb-4">Consulta tus Lecturas de RX</h2>

    <div id="login">
      <div class="mb-3">
        <label class="form-label">Tipo de Documento*</label>
        <select class="form-select" id="tipoDocumento">
          <option value="CC">CC</option>
          <option value="TI">TI</option>
          <option value="PE">PE</option>
          <option value="RC">RC</option>
          <option value="CE">CE</option>
          <option value="PA">PA</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Documento del Paciente*</label>
        <input type="text" id="numeroIdentificacion" class="form-control" placeholder="Sin puntos ni comas">
      </div>
      <div class="mb-3">
        <label class="form-label">Fecha de Nacimiento*</label>
        <input type="date" id="fechaNacimiento" class="form-control">
      </div>
      <div class="mb-3">
        <input type="checkbox" id="acuerdoPrivacidad">
        <label for="acuerdoPrivacidad"> Acepto la
          <a href="https://www.especialistasdeleje.com/politica-de-tratamiento-de-datos" target="_blank">política de tratamiento de datos</a>
        </label>
      </div>
      <div class="text-center">
        <button class="btn btn-primary" onclick="enviar()">Mostrar Examen</button>
      </div>
      <div class="text-center mt-3" id="loading" style="display:none;">
        <div class="spinner-border text-primary"></div>
      </div>
    </div>

    <div id="onError" class="mt-3 text-danger"></div>
    <div id="pagina2" class="mt-3"></div>
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzrCwaVBQXgBlkvYByMYyLYOMJb24rmWpiDVOmGPGB2pIp5HJzEedANr9vWrryiQrc2mA/exec";

    function enviar() {
      if (!document.getElementById('acuerdoPrivacidad').checked) {
        alert('Debe aceptar la política de tratamiento de datos.');
        return;
      }

      var datos = {
        tipoDocumento: document.getElementById('tipoDocumento').value,
        numeroIdentificacion: document.getElementById('numeroIdentificacion').value.trim(),
        fechaNacimiento: document.getElementById('fechaNacimiento').value
      };

      document.getElementById('loading').style.display = 'block';
      document.getElementById('onError').innerHTML = '';

      var url = WEBAPP_URL + "?tipoDocumento=" + encodeURIComponent(datos.tipoDocumento) +
                "&numeroIdentificacion=" + encodeURIComponent(datos.numeroIdentificacion) +
                "&fechaNacimiento=" + encodeURIComponent(datos.fechaNacimiento);

      window.open(url, '_blank');
      document.getElementById('loading').style.display = 'none';
    }
  </script>
</body>
</html>
